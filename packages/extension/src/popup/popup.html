<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #e0e0e0;
      background: #1e1e2e;
      padding: 16px;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 14px;
      color: #cdd6f4;
    }
    .status-card {
      padding: 12px;
      margin-bottom: 14px;
      border: 1px solid #45475a;
      border-radius: 10px;
      background: linear-gradient(180deg, #2a2b3d 0%, #1f2130 100%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }
    .status-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }
    .status-label {
      color: #bac2de;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .status-pill {
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #cdd6f4;
      background: #45475a;
    }
    .status-pill[data-phase="connected"] {
      color: #1e1e2e;
      background: #a6e3a1;
    }
    .status-pill[data-phase="connecting"] {
      color: #1e1e2e;
      background: #f9e2af;
    }
    .status-pill[data-phase="disconnected"] {
      color: #1e1e2e;
      background: #fab387;
    }
    .status-pill[data-phase="error"] {
      color: #1e1e2e;
      background: #f38ba8;
    }
    .status-detail {
      margin-bottom: 10px;
      color: #bac2de;
      line-height: 1.4;
    }
    .status-actions {
      display: flex;
      justify-content: flex-end;
    }
    button {
      border: 1px solid #585b70;
      border-radius: 8px;
      background: #313244;
      color: #cdd6f4;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    button:hover {
      background: #45475a;
    }
    button:disabled {
      opacity: 0.65;
      cursor: wait;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      cursor: pointer;
    }
    label.number-label {
      flex-wrap: wrap;
    }
    label span {
      flex: 1;
    }
    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #89b4fa;
    }
    input[type="number"] {
      width: 72px;
      padding: 3px 6px;
      border: 1px solid #45475a;
      border-radius: 4px;
      background: #313244;
      color: #cdd6f4;
      font-size: 13px;
    }
    select {
      padding: 3px 6px;
      border: 1px solid #45475a;
      border-radius: 4px;
      background: #313244;
      color: #cdd6f4;
      font-size: 13px;
    }
    .divider {
      border: none;
      border-top: 1px solid #45475a;
      margin: 12px 0;
    }
  </style>
</head>
<body>
  <h1>rune Options</h1>

  <section class="status-card" aria-label="Native host status">
    <div class="status-header">
      <span class="status-label">Native host</span>
      <span id="hostStatusBadge" class="status-pill" data-phase="connecting">Connecting</span>
    </div>
    <p id="hostStatusDetail" class="status-detail">Waiting for com.runeai.rune</p>
    <div class="status-actions">
      <button type="button" id="reconnectNativeHost">Reconnect</button>
    </div>
  </section>

  <label>
    <input type="checkbox" id="pointerAnimation" />
    <span>Pointer Animation</span>
  </label>

  <label>
    <input type="checkbox" id="auroraGlow" />
    <span>Aurora Glow</span>
  </label>

  <label>
    <span>Theme</span>
    <select id="auroraTheme">
      <option value="dark">Dark</option>
      <option value="light">Light</option>
    </select>
  </label>

  <hr class="divider" />

  <label class="number-label">
    <span>Click Delay (ms)</span>
    <input type="number" id="clickDelayMs" min="0" max="2000" step="50" />
  </label>

  <label>
    <input type="checkbox" id="autoScroll" />
    <span>Auto Scroll</span>
  </label>

  <script src="../../dist/popup.js"></script>
</body>
</html>
